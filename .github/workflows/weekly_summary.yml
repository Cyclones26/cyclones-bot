# Weekly Performance Summaries -- runs once a week.
# Mondays at 13:00 UTC (9am ET), summarizing the previous Mon-Sun window
# (the script itself computes "yesterday minus 6 days" -> "yesterday").

name: Weekly Performance Summary

on:
  schedule:
    - cron: "0 13 * * 1"   # Mondays
  workflow_dispatch: {}

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    concurrency: cyclones-bot-state
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly summary
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          MLB_TEAM_ID: "509"
          MLB_SEASON: "2026"
        run: python weekly_summary.py

      - name: Commit updated state.json
        run: |
          git config user.name "cyclones-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update weekly-summary state [skip ci]"
          git push
